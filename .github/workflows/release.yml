name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package release assets
        run: |
          mkdir -p release
          cp main.js manifest.json styles.css release/
          cp -R vendor release/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release/main.js
            release/manifest.json
            release/styles.css
            release/vendor/node-tikzjax/dist/index.js
          show-summary: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd release
          shopt -s globstar
          gh release create "${GITHUB_REF_NAME}" \
            main.js manifest.json styles.css vendor/** \
            --title "LuaTikZ ${GITHUB_REF_NAME}" \
            --generate-notes
